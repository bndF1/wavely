@if (store.currentEpisode()) {
  <div class="mini-player"
       [class.mini-player--desktop]="isDesktop"
       [attr.role]="isDesktop ? null : 'button'"
       [attr.tabindex]="isDesktop ? null : '0'"
       [attr.aria-label]="isDesktop ? null : ('player.open_full' | translate)"
       (click)="handleBodyClick()"
       (keydown.enter)="isDesktop ? null : handleBodyClick()"
       (keydown.space)="isDesktop ? null : handleBodyClick($event)">
    <ion-progress-bar
      class="mini-player__progress"
      [value]="progressValue"
      color="primary"
      [style.visibility]="store.currentEpisode()?.isLive ? 'hidden' : 'visible'">
    </ion-progress-bar>
    <div class="mini-player__body">
      <ion-thumbnail class="mini-player__artwork">
        <img
          [src]="store.currentEpisode()!.imageUrl || '/default-artwork.svg'"
          [alt]="store.currentEpisode()!.title"
          loading="lazy" />
      </ion-thumbnail>
      <div class="mini-player__info">
        <p class="mini-player__title">{{ store.currentEpisode()!.title }}</p>
      </div>
      @if (!store.currentEpisode()?.isLive) {
        <ion-button
          fill="clear"
          class="mini-player__skip-btn mini-player__skip-btn--desktop"
          (click)="skipBack($event)"
          [attr.aria-label]="'player.skip_back' | translate">
          <ion-icon slot="icon-only" name="play-skip-back"></ion-icon>
        </ion-button>
      }
      <ion-button
        fill="clear"
        class="mini-player__play-btn"
        (click)="togglePlay($event)"
        [attr.aria-label]="store.isPlaying() ? ('player.pause' | translate) : ('player.play' | translate)">
        <ion-icon
          slot="icon-only"
          [name]="store.isPlaying() ? 'pause-circle' : 'play-circle'">
        </ion-icon>
      </ion-button>
      @if (!store.currentEpisode()?.isLive) {
        <ion-button
          fill="clear"
          class="mini-player__skip-btn mini-player__skip-btn--desktop"
          (click)="skipForward($event)"
          [attr.aria-label]="'player.skip_forward' | translate">
          <ion-icon slot="icon-only" name="play-skip-forward"></ion-icon>
        </ion-button>
      }
      <ion-button
        fill="clear"
        class="mini-player__close-btn"
        (click)="close($event)"
        [attr.aria-label]="'player.close' | translate">
        <ion-icon slot="icon-only" name="close-circle"></ion-icon>
      </ion-button>
    </div>
  </div>
}
