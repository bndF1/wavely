<ion-header>
  <ion-toolbar>
    <ion-title>Welcome to Wavely</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-content>
      <h2>Sign in to sync your library</h2>
      <p>Use your Google account to continue.</p>

      <ion-button
        expand="block"
        [disabled]="authStore.isLoading()"
        (click)="signInWithGoogle()">
        Continue with Google
      </ion-button>

      @if (authStore.error()) {
        <ion-text color="danger">
          <p>{{ authStore.error() }}</p>
        </ion-text>
      }
    </ion-card-content>
  </ion-card>
</ion-content>
