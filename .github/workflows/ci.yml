name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate environment stubs
        run: node scripts/generate-env.mjs
        # Generates env files with empty strings (no secrets needed for type-check/build CI)

      - name: Type check
        run: bunx tsc --noEmit --project tsconfig.app.json

      - name: Lint
        run: bunx nx lint

      - name: Build
        run: bunx nx build --configuration=production

      - name: Test
        run: bunx nx test --coverage --ci --passWithNoTests

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  version-bump-check:
    name: Version Bump Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version is bumped
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1)
          LATEST_VERSION=${LATEST_TAG#v}

          echo "package.json version : $PKG_VERSION"
          echo "Latest git tag        : ${LATEST_TAG:-none}"

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags — first release, skipping check."
            exit 0
          fi

          # Use node's semver comparison: fail if PKG_VERSION <= LATEST_VERSION
          node -e "
            const [a, b] = ['$PKG_VERSION', '$LATEST_VERSION'].map(v => v.split('.').map(Number));
            const isGreater = a[0] > b[0] || (a[0] === b[0] && a[1] > b[1]) || (a[0] === b[0] && a[1] === b[1] && a[2] > b[2]);
            if (!isGreater) {
              console.error('ERROR: package.json version (' + '$PKG_VERSION' + ') must be greater than latest tag (' + '$LATEST_VERSION' + ').');
              console.error('Bump the version in package.json before merging to main.');
              process.exit(1);
            }
            console.log('OK: ' + '$PKG_VERSION' + ' > ' + '$LATEST_VERSION');
          "
