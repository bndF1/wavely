name: Deploy to Firebase Hosting (Staging)

# Deploys to the staging Firebase project from the develop branch.
# Prerequisites:
#   1. Create a Firebase project (e.g., wavely-staging) in Firebase console
#   2. Add secrets: NG_APP_FIREBASE_*_STAGING, FIREBASE_TOKEN_STAGING, FIREBASE_PROJECT_STAGING
#   3. Update the --project flag below with your staging project ID

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  build-and-deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate environment files (staging)
        run: ENV_TARGET=staging node scripts/generate-env.mjs
        env:
          NG_APP_FIREBASE_API_KEY: ${{ secrets.NG_APP_FIREBASE_API_KEY_STAGING }}
          NG_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.NG_APP_FIREBASE_AUTH_DOMAIN_STAGING }}
          NG_APP_FIREBASE_PROJECT_ID: ${{ secrets.NG_APP_FIREBASE_PROJECT_ID_STAGING }}
          NG_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.NG_APP_FIREBASE_STORAGE_BUCKET_STAGING }}
          NG_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NG_APP_FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          NG_APP_FIREBASE_APP_ID: ${{ secrets.NG_APP_FIREBASE_APP_ID_STAGING }}
          NG_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.NG_APP_FIREBASE_MEASUREMENT_ID_STAGING }}

      - name: Build (staging)
        run: bunx nx build --configuration=staging && cp dist/wavely/browser/index.csr.html dist/wavely/browser/index.html

      - name: Deploy to Firebase Hosting (staging)
        run: bunx firebase-tools deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_STAGING }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_STAGING }}

      - name: Deploy Firestore Rules (staging)
        run: bunx firebase-tools deploy --only firestore:rules --project ${{ secrets.FIREBASE_PROJECT_STAGING }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN_STAGING }}
