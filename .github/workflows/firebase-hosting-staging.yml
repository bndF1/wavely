name: Deploy to Firebase Hosting (Staging)

# Deploys the staging branch to a persistent Firebase Hosting preview channel.
#
# Firebase Hosting preview channel URLs include a random hash assigned at channel
# creation: https://wavely-f659c--staging-<hash>.web.app
# The actual URL is output as a GitHub deployment and job summary after each run.
#
# The channel is refreshed on every push to staging (--expires 30d resets the timer).
# A weekly cron in firebase-channel-refresh.yml prevents accidental expiry.
#
# Flow: feature/* → dev → PR → staging (here) → PR → main (production)

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build-and-deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate environment stubs
        run: node scripts/generate-env.mjs

      - name: Run unit tests
        run: bun run test

      - name: Generate environment files
        run: ENV_TARGET=prod node scripts/generate-env.mjs
        env:
          NG_APP_FIREBASE_API_KEY: ${{ secrets.NG_APP_FIREBASE_API_KEY }}
          NG_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.NG_APP_FIREBASE_AUTH_DOMAIN }}
          NG_APP_FIREBASE_PROJECT_ID: ${{ secrets.NG_APP_FIREBASE_PROJECT_ID }}
          NG_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.NG_APP_FIREBASE_STORAGE_BUCKET }}
          NG_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NG_APP_FIREBASE_MESSAGING_SENDER_ID }}
          NG_APP_FIREBASE_APP_ID: ${{ secrets.NG_APP_FIREBASE_APP_ID }}
          NG_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.NG_APP_FIREBASE_MEASUREMENT_ID }}

      - name: Build
        run: bunx nx build --configuration=production && cp dist/wavely/browser/index.csr.html dist/wavely/browser/index.html

      - name: Deploy to staging channel
        id: deploy
        run: |
          OUTPUT=$(bunx firebase-tools hosting:channel:deploy staging \
            --expires 30d \
            --project wavely-f659c \
            --json 2>/dev/null)
          URL=$(node -e "
            try { const r=JSON.parse(process.argv[1]); console.log(Object.values(r.result||{})[0]?.url||''); }
            catch { console.log(''); }
          " "$OUTPUT")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "## 🔥 Staging deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: [$URL]($URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Channel expires in 30 days. Bookmark this URL — it stays stable as long as the channel is refreshed before expiry." >> $GITHUB_STEP_SUMMARY
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Add staging channel URL to Firebase Auth authorized domains
        if: steps.deploy.outputs.url != ''
        run: |
          DOMAIN=$(echo "${{ steps.deploy.outputs.url }}" | sed 's|https://||' | sed 's|/.*||')
          echo "Authorizing domain: $DOMAIN"
          node scripts/firebase-add-auth-domain.mjs "$DOMAIN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          NG_APP_FIREBASE_PROJECT_ID: ${{ secrets.NG_APP_FIREBASE_PROJECT_ID }}
