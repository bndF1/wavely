name: Refresh Firebase Hosting Channels

# Prevents the dev and staging Firebase Hosting channels from expiring.
#
# Firebase preview channels have a max lifespan of 30 days via --expires.
# This weekly cron re-deploys HEAD of dev and staging to reset the 30-day timer,
# ensuring channels never expire between active development periods.
#
# Runs every Monday at 06:00 UTC.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate environment files
        run: ENV_TARGET=prod node scripts/generate-env.mjs
        env:
          NG_APP_FIREBASE_API_KEY: ${{ secrets.NG_APP_FIREBASE_API_KEY }}
          NG_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.NG_APP_FIREBASE_AUTH_DOMAIN }}
          NG_APP_FIREBASE_PROJECT_ID: ${{ secrets.NG_APP_FIREBASE_PROJECT_ID }}
          NG_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.NG_APP_FIREBASE_STORAGE_BUCKET }}
          NG_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NG_APP_FIREBASE_MESSAGING_SENDER_ID }}
          NG_APP_FIREBASE_APP_ID: ${{ secrets.NG_APP_FIREBASE_APP_ID }}
          NG_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.NG_APP_FIREBASE_MEASUREMENT_ID }}

      - name: Build
        run: bunx nx build --configuration=production && cp dist/wavely/browser/index.csr.html dist/wavely/browser/index.html

      - name: Refresh dev channel
        id: deploy
        run: |
          OUTPUT=$(bunx firebase-tools hosting:channel:deploy dev \
            --expires 30d \
            --project wavely-f659c \
            --json 2>/dev/null)
          URL=$(node -e "
            try { const r=JSON.parse(process.argv[1]); console.log(Object.values(r.result||{})[0]?.url||''); }
            catch { console.log(''); }
          " "$OUTPUT")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "## 🔄 Dev channel refreshed" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: [$URL]($URL)" >> $GITHUB_STEP_SUMMARY
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  refresh-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate environment files
        run: ENV_TARGET=prod node scripts/generate-env.mjs
        env:
          NG_APP_FIREBASE_API_KEY: ${{ secrets.NG_APP_FIREBASE_API_KEY }}
          NG_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.NG_APP_FIREBASE_AUTH_DOMAIN }}
          NG_APP_FIREBASE_PROJECT_ID: ${{ secrets.NG_APP_FIREBASE_PROJECT_ID }}
          NG_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.NG_APP_FIREBASE_STORAGE_BUCKET }}
          NG_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NG_APP_FIREBASE_MESSAGING_SENDER_ID }}
          NG_APP_FIREBASE_APP_ID: ${{ secrets.NG_APP_FIREBASE_APP_ID }}
          NG_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.NG_APP_FIREBASE_MEASUREMENT_ID }}

      - name: Build
        run: bunx nx build --configuration=production && cp dist/wavely/browser/index.csr.html dist/wavely/browser/index.html

      - name: Refresh staging channel
        id: deploy
        run: |
          OUTPUT=$(bunx firebase-tools hosting:channel:deploy staging \
            --expires 30d \
            --project wavely-f659c \
            --json 2>/dev/null)
          URL=$(node -e "
            try { const r=JSON.parse(process.argv[1]); console.log(Object.values(r.result||{})[0]?.url||''); }
            catch { console.log(''); }
          " "$OUTPUT")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "## 🔄 Staging channel refreshed" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: [$URL]($URL)" >> $GITHUB_STEP_SUMMARY
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
