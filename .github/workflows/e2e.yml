name: E2E Tests

# Runs Playwright E2E tests with the Firebase Auth + Firestore Emulators.
# Required status check for merging into `main` (set in branch protection rules).
#
# Architecture:
#   1. Build the app with --configuration=e2e (fake Firebase config + useEmulators=true)
#   2. Start Firebase Auth + Firestore emulators
#   3. Playwright global-setup creates a test user and saves browser auth state
#   4. Tests run against the local build using the pre-authenticated context

on:
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Firebase emulator binaries
        id: firebase-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-v2-${{ hashFiles('**/firebase.json') }}
          restore-keys: firebase-emulators-v2-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for E2E
        # Uses environment.e2e.ts: fake Firebase config + useEmulators=true
        run: |
          bunx nx build --configuration=e2e
          cp dist/wavely/browser/index.csr.html dist/wavely/browser/index.html

      - name: Pre-download Firebase Emulator JARs
        if: steps.firebase-cache.outputs.cache-hit != 'true'
        run: |
          # Download emulator JARs before starting; avoids timeout during health-check wait
          npx --yes firebase-tools@15 emulators:start \
            --only auth,firestore \
            --project wavely-f659c &
          EMU_PID=$!
          # Give it 90s to download JARs and start
          sleep 90
          kill $EMU_PID 2>/dev/null || true
          echo "✅ Emulator JARs pre-downloaded"

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start Firebase Emulators
        run: |
          bunx firebase-tools emulators:start \
            --only auth,firestore \
            --project wavely-f659c &
          # Wait for auth emulator (JARs are now cached — should start in <10s)
          timeout 120 bash -c \
            'until curl -sf http://localhost:9099 > /dev/null 2>&1; do sleep 2; done'
          echo "✅ Auth emulator ready"
          # Wait for Firestore emulator
          timeout 120 bash -c \
            'until curl -sf http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'
          echo "✅ Firestore emulator ready"

      - name: Run E2E tests (Chromium only)
        run: bunx nx e2e --project=chromium
        env:
          CI: 'true'
          USE_EMULATORS: 'true'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'
          BASE_URL: 'http://localhost:4200'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
